name: Build DB & Deploy

# 當 data/json/ 有新檔案(或前端 / 設定變動)時,把 JSON 整理成 SQLite 並部署到 GitHub Pages。
on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "src/**"
      - "scripts/**"
      - "type-check.ts"
      - "index.html"
      - "package.json"
      - "vite.config.ts"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci # 有 package-lock.json,用 ci 更快且可重現(會用上面的 npm cache)

      - name: Validate score JSON (informational)
        run: npm run check
        continue-on-error: true # 單一檔案格式錯誤不擋部署;build:db 會自動跳過無效檔案

      # 快取 tsc -b 的 *.tsbuildinfo,讓只改 data/ 的部署能跳過型別重新編譯。
      # key 帶 sha 每次都存新的,restore-keys 還原上一次當作增量基底。
      - name: Cache TypeScript incremental build
        uses: actions/cache@v4
        with:
          path: "*.tsbuildinfo"
          key: tsbuild-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            tsbuild-${{ runner.os }}-

      - name: Build SQLite (public/data.db) + site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
